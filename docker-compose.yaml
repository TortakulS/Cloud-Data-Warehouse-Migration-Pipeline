version: '3.8'
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.7.0}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false' 
    GOOGLE_APPLICATION_CREDENTIALS: /gcloud/application_default_credentials.json
  volumes:
    - ${XYZ_AIRFLOW_PROJ_DIR:-./dags}:/opt/airflow/dags
    - ${XYZ_AIRFLOW_PROJ_DIR:-./logs}:/opt/airflow/logs
    - ${XYZ_AIRFLOW_PROJ_DIR:-./plugins}:/opt/airflow/plugins
    - ${XYZ_AIRFLOW_PROJ_DIR:-./scripts}:/opt/airflow/scripts 
    - ~/.config/gcloud:/gcloud 
    - ${APPDATA}/gcloud:/gcloud
  user: "${AIRFLOW_UID:-5000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080" 
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-airflow}
      _WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-airflow}
    